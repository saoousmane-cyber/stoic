<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#db2777"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fbbf24"/>
      <stop offset="100%" style="stop-color:#f97316"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Pattern overlay -->
  <circle cx="100" cy="100" r="200" fill="white" opacity="0.03"/>
  <circle cx="1100" cy="500" r="250" fill="white" opacity="0.03"/>
  <circle cx="600" cy="315" r="300" fill="white" opacity="0.02"/>
  
  <!-- Main text -->
  <text x="600" y="280" font-family="'Inter', system-ui, sans-serif" font-weight="800" font-size="64" fill="white" text-anchor="middle" letter-spacing="2">
    AURA &amp; LOGOS
  </text>
  
  <!-- Subtitle -->
  <text x="600" y="350" font-family="'Inter', system-ui, sans-serif" font-weight="500" font-size="28" fill="#c7d2fe" text-anchor="middle">
    Générateur automatisé de contenu
  </text>
  
  <!-- Tagline -->
  <text x="600" y="400" font-family="'Inter', system-ui, sans-serif" font-weight="400" font-size="18" fill="#a5b4fc" text-anchor="middle">
    Créez des vidéos qui captivent. Sans monter. Sans tourner. Sans stress.
  </text>
  
  <!-- Bottom text -->
  <text x="600" y="560" font-family="'Inter', system-ui, sans-serif" font-weight="600" font-size="20" fill="url(#textGrad)" text-anchor="middle">
    auraandlogos.com
  </text>
  
  <!-- Decorative elements -->
  <circle cx="200" cy="500" r="4" fill="white" opacity="0.2"/>
  <circle cx="1000" cy="150" r="3" fill="white" opacity="0.2"/>
  <circle cx="950" cy="520" r="5" fill="white" opacity="0.15"/>
  <circle cx="250" cy="120" r="3" fill="white" opacity="0.15"/>
</svg>