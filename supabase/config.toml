# AURA & LOGOS - Configuration Supabase
# Documentation: https://supabase.com/docs/reference/cli/config

[general]
project_id = "aura-and-logos"

[api]
enabled = true
port = 54321
schemas = ["public", "auth", "storage"]
extra_search_path = ["public", "extensions"]

[api.schemas]
public = { 
  name = "public",
  description = "Main application schema for AURA & LOGOS"
}

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = true
port = 54323
pool_mode = "transaction"
default_pool_size = 20
max_client_conn = 100

[studio]
port = 54324

[inbucket]
port = 54325
email = "admin@auraandlogos.com"
smtp_port = 54326
pop3_port = 54327

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["https://auraandlogos.com/**"]
jwt_expiry = 3600

[auth.email]
enabled = true
double_confirm_changes = false
enable_confirmations = false

[auth.email.template]
invite = "invite.html"
confirmation = "confirmation.html"
recovery = "recovery.html"
magic_link = "magic-link.html"
email_change = "email-change.html"

[auth.sms]
enabled = false

[auth.external]
enabled = true

[auth.external.google]
enabled = true
client_id = "env(GOOGLE_CLIENT_ID)"
secret = "env(GOOGLE_CLIENT_SECRET)"
redirect_uri = "http://localhost:3000/api/auth/callback/google"

[edge_runtime]
enabled = true
policy = "all"

[analytics]
enabled = true
port = 54328